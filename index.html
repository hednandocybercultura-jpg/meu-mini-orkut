<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Mini-Orkut</title>
    <style>
      body {
        background-color: #f0f2f5;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 50px;
        gap: 20px;
      }
      
      /* Uma classe mágica para esconder coisas da tela */
      .escondido {
        display: none !important;
      }

      /* Tela de Login */
      .tela-login {
        background-color: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        text-align: center;
      }

      .btn-google {
        background-color: #4285F4;
        color: white;
        border: none;
        padding: 15px 20px;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        font-weight: bold;
      }

      /* Container Principal do App (Perfil + Mural) */
      .app-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      .perfil-card {
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        text-align: center;
        width: 300px;
      }

      .perfil-card img {
        border-radius: 50%;
        width: 150px;
        height: 150px;
        object-fit: cover;
      }

      .btn-sair {
        background-color: #dc3545;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 10px;
      }

      .mural-card {
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        width: 400px;
      }

      textarea {
        width: 100%;
        height: 60px;
        margin-bottom: 10px;
        border-radius: 5px;
        border: 1px solid #ccc;
        padding: 10px;
        font-family: Arial, sans-serif;
        box-sizing: border-box;
      }

      button {
        background-color: #0056b3;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 5px;
        cursor: pointer;
        width: 100%;
        font-weight: bold;
      }

      /* Agora o recado tem espaço para a foto da pessoa */
      .recado {
        background-color: #f9f9f9;
        padding: 10px;
        margin-top: 20px;
        border-left: 4px solid #0056b3;
        display: flex; /* Organiza foto e texto lado a lado */
        gap: 15px;
        align-items: center;
      }

      .recado img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>

    <div id="tela-login" class="tela-login">
      <h1>Bem-vindo ao Mini-Orkut</h1>
      <p>Faça login para ver a comunidade.</p>
      <button id="btn-login-google" class="btn-google">Entrar com o Google</button>
    </div>

    <div id="app-principal" class="app-container escondido">
      
      <div class="perfil-card">
        <h1>Meu Perfil</h1>
        <img id="foto-perfil" src="" alt="Minha Foto">
        <p><strong>Nome:</strong> <span id="nome-perfil"></span></p>
        <p><strong>Status:</strong> Construindo minha primeira rede social!</p>
        <button id="btn-sair" class="btn-sair">Sair da Conta</button>
      </div>

      <div class="mural-card">
        <h2>Scrapbook</h2>
        <textarea id="campo-recado" placeholder="Deixe um recado..."></textarea>
        <button id="botao-enviar">Enviar Recado</button>
        <div id="lista-recados"></div>
      </div>

    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
      import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
      // IMPORT NOVO: As ferramentas de Login do Firebase
      import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDKA5A8Xp93HMnsXkWwioMtJGrvXtZZpVU",
        authDomain: "mini-365cd.firebaseapp.com",
        projectId: "mini-365cd",
        storageBucket: "mini-365cd.firebasestorage.app",
        messagingSenderId: "790691244828",
        appId: "1:790691244828:web:db1ac4c74a8c7fa11568d9"
      };

      const app = initializeApp(firebaseConfig);
      const bancoDeDados = getFirestore(app);
      
      // Ligando o motor de Autenticação
      const auth = getAuth(app);
      const provedorGoogle = new GoogleAuthProvider();

      // Referências da Tela
      const telaLogin = document.getElementById('tela-login');
      const appPrincipal = document.getElementById('app-principal');
      const btnLoginGoogle = document.getElementById('btn-login-google');
      const btnSair = document.getElementById('btn-sair');
      
      const fotoPerfil = document.getElementById('foto-perfil');
      const nomePerfil = document.getElementById('nome-perfil');
      
      const campoRecado = document.getElementById('campo-recado');
      const botaoEnviar = document.getElementById('botao-enviar');
      const listaRecados = document.getElementById('lista-recados');

      const gavetaRecados = collection(bancoDeDados, "recados");

      // Variável para lembrar quem está usando a página agora
      let usuarioLogado = null;

      // AÇÃO: Clicar em Entrar
      btnLoginGoogle.addEventListener('click', async () => {
        try {
          await signInWithPopup(auth, provedorGoogle);
        } catch (erro) {
          console.error("Erro ao fazer login:", erro);
        }
      });

      // AÇÃO: Clicar em Sair
      btnSair.addEventListener('click', () => {
        signOut(auth);
      });

      // O VIGIA DE SESSÃO: Fica monitorando se a pessoa entrou ou saiu
      onAuthStateChanged(auth, (user) => {
        if (user) {
          // A pessoa está logada!
          usuarioLogado = user;
          
          // Preenche o perfil com os dados reais do Google
          nomePerfil.innerText = user.displayName;
          fotoPerfil.src = user.photoURL;

          // Esconde o login e mostra o App
          telaLogin.classList.add('escondido');
          appPrincipal.classList.remove('escondido');
        } else {
          // A pessoa saiu (ou não entrou ainda)
          usuarioLogado = null;
          
          // Mostra o login e esconde o App
          telaLogin.classList.remove('escondido');
          appPrincipal.classList.add('escondido');
        }
      });

      // AÇÃO: Enviar um Recado (agora usando os dados reais!)
      botaoEnviar.addEventListener('click', async function() {
        const textoDigitado = campoRecado.value;
        if (textoDigitado === '' || !usuarioLogado) return; 

        await addDoc(gavetaRecados, {
          nome: usuarioLogado.displayName,
          foto: usuarioLogado.photoURL, // Salva o link da foto da pessoa!
          texto: textoDigitado,
          dataHora: Date.now()
        });

        campoRecado.value = ''; 
      });

      // OUVIR MURAL: Agora puxa e mostra a foto no HTML
      const regraDeBusca = query(gavetaRecados, orderBy("dataHora", "desc"));
      onSnapshot(regraDeBusca, (resultado) => {
        listaRecados.innerHTML = ''; 

        resultado.forEach((documento) => {
          const recado = documento.data();
          
          // Se o recado for antigo (antes do login existir), usa uma foto padrão de silhueta
          const fotoParaMostrar = recado.foto ? recado.foto : "https://via.placeholder.com/40";

          listaRecados.innerHTML += `
            <div class="recado">
              <img src="${fotoParaMostrar}" alt="Foto">
              <div>
                <p style="margin: 0;"><strong>${recado.nome}</strong></p>
                <p style="margin: 5px 0 0 0;">${recado.texto}</p>
              </div>
            </div>
          `;
        });
      });
    </script>
  </body>
</html>
